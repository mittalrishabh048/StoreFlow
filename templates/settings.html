{% extends 'base.html' %}

{% block content %}
<div class="invoice-wrapper">
    <div class="invoice-branding-row" style="border-bottom: 2px solid #1a73e8; margin-bottom: 20px;">
        <div>
            <h1 class="invoice-title">Global Core Settings</h1>
            <p class="invoice-subtitle">
                Modify configuration options across the StoreFlow framework
            </p>
        </div>

        <div class="invoice-actions-row no-print" style="border-top:none; padding-top:0;">
            <a href="/" class="btn-dashboard-back" style="background-color:#757070;">
                ← Dashboard
            </a>
        </div>
    </div>

    <form
        method="POST"
        action="/settings"
        class="panel panel-large"
        style="display:flex; flex-direction:column; gap:18px;"
    >

        <div class="form-grid-2">
            <div>
                <label class="form-label">Store Engine Name</label>
                <input
                    class="form-control"
                    type="text"
                    name="store_name"
                    value="{{ settings.store_name }}"
                    required
                >
            </div>

            <div>
                <label class="form-label">Base Currency Symbol</label>
                <input
                    class="form-control"
                    type="text"
                    name="currency"
                    value="{{ settings.currency }}"
                    required
                >
            </div>
        </div>

        <div class="form-grid-2">
            <div>
                <label class="form-label">Global Tax Rate (Decimal)</label>
                <input
                    class="form-control"
                    type="number"
                    step="0.01"
                    min="0"
                    name="tax_rate"
                    value="{{ settings.tax_rate }}"
                    required
                >
            </div>

            <div>
                <label class="form-label">Low Stock Warning Level</label>
                <input
                    class="form-control"
                    type="number"
                    min="0"
                    name="low_stock_threshold"
                    value="{{ settings.low_stock_threshold }}"
                    required
                >
            </div>
        </div>

        <div>
            <label class="form-label">Physical Address Location</label>
            <input
                class="form-control"
                type="text"
                name="address"
                value="{{ settings.address }}"
            >
        </div>

        <div class="form-grid-2">
            <div>
                <label class="form-label">Contact Phone Line</label>
                <input
                    class="form-control"
                    type="text"
                    name="phone"
                    value="{{ settings.phone }}"
                >
            </div>

            <div>
                <label class="form-label">Support Email Address</label>
                <input
                    class="form-control"
                    type="email"
                    name="email"
                    value="{{ settings.email }}"
                >
            </div>
        </div>

        <button
            type="submit"
            class="btn-dashboard-back"
            style="border:none; padding:12px; margin-top:10px; cursor:pointer;"
        >
            💾 Save Configuration Options
        </button>

    </form>
</div>
{% endblock %}
