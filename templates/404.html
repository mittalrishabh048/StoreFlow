{% extends 'base.html' %}

{% block content %}
<div style="max-width: 600px; margin: 60px auto; text-align: center; padding: 40px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
    <h1 style="font-size: 5rem; margin: 0; color: #e53e3e; font-weight: 800;">404</h1>
    <h2 style="color: #2d3748; margin-top: 10px; font-size: 1.8rem;">Page Not Found</h2>
    <p style="color: #718096; margin: 20px 0 30px 0; line-height: 1.6;">
        Oops! The page you are looking for doesn't exist, has been removed, or is temporarily unavailable.
    </p>
    <a href="/" style="display: inline-block; background-color: #1a73e8; color: white; padding: 12px 24px; text-decoration: none; border-radius: 4px; font-weight: bold; transition: background 0.2s;">
        ← Back to Dashboard
    </a>
</div>
{% endblock %}
